project:
  type: book
  output-dir: docs

website:
  title: "DevOps Workshop 2026"
  
  # Top Navigation Bar
  navbar:
    logo: images/workshop-logo.png
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Prerequisites"
        href: setup.qmd
      - text: "Labs & Modules"
        href: modules/index.qmd
    right:
      - icon: github
        href: https://github.com

  # Left-hand Sidebar for Lab Navigation
  sidebar:
    - id: modules
      title: "Workshop Modules"
      style: "docked"
      collapse-level: 1
      contents:
        - modules/index.qmd
        - modules/openlayers.qmd
        - modules/wegue.qmd
        - href: troubleshooting.qmd
          text: "Troubleshooting FAQ"

format:
  html:
    theme: 
      light: cosmo
      dark: superhero
    css: custom-styles.css
    toc: true
    toc-location: right
    toc-depth: 3
    number-sections: true
    code-copy: true
    code-overflow: wrap

execute:
  eval: false
  echo: true
  warning: false
